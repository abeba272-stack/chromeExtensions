<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WaveDrop</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="wd-popup-body">
    <main class="wd-popup-shell">
      <div class="wd-glow wd-glow-one"></div>
      <div class="wd-glow wd-glow-two"></div>

      <section class="wd-popup-panel">
        <header class="wd-popup-header">
          <div>
            <p class="wd-kicker">WaveDrop</p>
            <h1 class="wd-popup-title">Media handoff for YouTube tabs</h1>
            <p class="wd-popup-subtitle">
              Capture the active video, keep a local library, and move quickly between
              copy, share, and handoff actions.
            </p>
          </div>
          <span class="wd-chip wd-chip-live">MV3</span>
        </header>

        <div id="app" class="wd-popup-content" aria-live="polite"></div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
