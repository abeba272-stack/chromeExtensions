<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WaveDrop</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="wd-popup-body">
    <main class="wd-popup-shell">
      <div class="wd-glow wd-glow-one"></div>
      <div class="wd-glow wd-glow-two"></div>

      <section class="wd-popup-panel">
        <header class="wd-popup-header">
          <div class="wd-popup-header-bar">
            <div class="wd-window-controls wd-window-controls-static" aria-hidden="true">
              <span class="wd-window-dot wd-window-dot-red"></span>
              <span class="wd-window-dot wd-window-dot-yellow"></span>
              <span class="wd-window-dot wd-window-dot-green"></span>
            </div>
            <span class="wd-chip wd-chip-live">MV3</span>
          </div>

          <div class="wd-popup-hero">
            <p class="wd-kicker">WaveDrop</p>
            <h1 class="wd-popup-title">Midnight handoff for YouTube tabs</h1>
            <p class="wd-popup-subtitle">
              Mac-window chrome up top, black-violet atmosphere underneath, and a local vault
              for the videos you want to keep in reach.
            </p>
          </div>
        </header>

        <div id="app" class="wd-popup-content" aria-live="polite"></div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
