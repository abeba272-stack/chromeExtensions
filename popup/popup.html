<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WaveDrop</title>
    <link rel="stylesheet" href="../shared/theme.css" />
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body class="wd-popup-page">
    <main class="wd-popup-frame">
      <section class="wd-popup-surface">
        <header class="wd-popup-header">
          <div class="wd-popup-header-copy">
            <span class="wd-popup-kicker">WaveDrop</span>
            <h1 class="wd-popup-title">Download Console</h1>
            <p class="wd-popup-subtitle">YouTube companion controls with a compact player-like layout.</p>
          </div>
          <div class="wd-popup-header-meta">
            <span id="wd-popup-context-badge" class="wd-popup-badge">Checking page</span>
          </div>
        </header>
        <div id="wd-popup-root" class="wd-popup-scroll" aria-live="polite"></div>
      </section>
    </main>

    <script src="../shared/constants.js"></script>
    <script src="../shared/messages.js"></script>
    <script src="../shared/storage.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
